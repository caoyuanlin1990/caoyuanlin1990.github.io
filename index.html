   <!-- 引入图标库 --><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", Roboto, sans-serif;
            transition: all 0.3s ease;
        }

        /* 浅色模式默认样式 */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-hover-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --search-bg: rgba(255, 255, 255, 0.9);
            --search-border: #e2e8f0;
            --btn-bg: linear-gradient(135deg, #409eff 0%, #2f80ed 100%);
            --shadow-light: 0 8px 20px rgba(0, 0, 0, 0.08);
            --shadow-heavy: 0 12px 30px rgba(0, 0, 0, 0.12);
        }

        /* 深色模式变量 */
        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            --card-bg: rgba(45, 55, 72, 0.8);
            --card-hover-bg: rgba(60, 70, 88, 0.9);
            --text-primary: #f7fafc;
            --text-secondary: #cbd5e0;
            --search-bg: rgba(45, 55, 72, 0.9);
            --search-border: #4a5568;
            --btn-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-light: 0 8px 20px rgba(0, 0, 0, 0.2);
            --shadow-heavy: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-primary);
            padding: 3rem 1.5rem;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
        }

        /* 深色模式切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.05);
            box-shadow: var(--shadow-heavy);
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: var(--btn-bg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        /* 搜索框样式 */
        .search-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 4rem;
            background: var(--search-bg);
            padding: 0.8rem 1rem;
            border-radius: 24px;
            box-shadow: var(--shadow-light);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--search-border);
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            color: var(--text-primary);
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 20px;
            background: var(--btn-bg);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: var(--shadow-light);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        /* 导航分类样式 */
        .nav-section {
            margin-bottom: 3.5rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .section-title i {
            color: #409eff;
            font-size: 1.4rem;
        }

        /* 链接网格布局 */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.2rem;
        }

        /* 导航卡片样式 */
        .nav-card {
            background: var(--card-bg);
            padding: 1.5rem 1rem;
            border-radius: 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            box-shadow: var(--shadow-light);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .nav-card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: var(--shadow-heavy);
            background: var(--card-hover-bg);
        }

        .nav-card i {
            font-size: 1.8rem;
            background: var(--btn-bg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-card span {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }

            .link-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }

            .theme-toggle {
                top: 1.5rem;
                right: 1.5rem;
                width: 40px;
                height: 40px;
            }

            body {
                padding: 2rem 1rem;
            }
        }</style>

   <script>
        // 搜索功能
        function searchWeb() {
            const keyWord = document.getElementById('searchInput').value.trim();
            if (keyWord) {
                window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(keyWord)}`, '_blank');
            }
        }

        // 回车触发搜索
        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                searchWeb();
            }
        });

        // 深色模式切换
        const themeBtn = document.getElementById('themeBtn');
        const body = document.body;
        const themeIcon = themeBtn.querySelector('i');

        // 读取本地存储的主题
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        themeBtn.addEventListener('click', function () {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                themeIcon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
