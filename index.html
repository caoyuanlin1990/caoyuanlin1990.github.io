<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>闲时导航 - 自动加载配置</title>
<script src="https://cdn.bootcdn.net/ajax/libs/blueimp-md5/1.0.1/js/md5.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
}
html,body {
  width:100%;
  min-height:100vh;
  background:#F7F8FA;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  /* 移动端软键盘适配 */
  min-height: -webkit-fill-available;
}
body {
  height: -webkit-fill-available;
}
:root {
  --primary:#165DFF; --success:#00B42A; --danger:#F53F3F;
  --warning:#FF7D00; --neutral:#86909C; --light:#F2F3F5;
  --card-bg:#fff; --border:#E5E6EB; --radius:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --text-main:#1D2129; --text-normal:#4E5969;
  --loading:rgb(22, 93, 255, 0.2);
}
/* 按钮禁用样式 */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  background: var(--light) !important;
  color: var(--neutral) !important;
}
/* 加载状态样式 */
.loading {
  position: relative;
  pointer-events: none;
}
.loading::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 16px;
  height: 16px;
  margin: -8px 0 0 -8px;
  border: 2px solid #fff;
  border-top: 2px solid transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.nav-card {
  background:var(--card-bg); padding:16px 14px; margin-bottom:10px;
  border:1px solid var(--border); display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:all 0.2s;
  /* 小屏点击热区优化 */
  min-height: 60px;
}
.nav-card:hover { border-color:var(--primary); background:#F7F8FF; }
.nav-card.round { border-radius:16px; }
.nav-card.square { border-radius:0; }
.nav-card.flat { border-radius:8px; border:none; background:#f2f3f7; }
.nav-card.center .nav-icon { margin:0 auto; }
.nav-icon {
  width:34px; height:34px; background:var(--primary); color:#fff;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:16px; flex-shrink:0;
}
.nav-text { flex:1; font-size:15px; font-weight:500; color:var(--text-main); }
#splash {
  position:fixed; top:0; left:0; width:100%; height:100vh;
  background:#fff; display:flex; flex-direction:column; align-items:center;
  justify-content:center; z-index:99999; color:var(--primary); gap:16px;
}
.splash-icon { font-size:52px; }
.splash-title { font-size:26px; font-weight:600; color:var(--text-main); }
.splash-desc { font-size:14px; color:var(--neutral); }
.splash-footer { position:absolute; bottom:36px; font-size:12px; color:var(--neutral); }
#notice {
  position:fixed; top:0; left:0; width:100%; height:100vh;
  background:#F7F8FA; display:none; flex-direction:column; align-items:center;
  justify-content:center; z-index:9999; padding:30px;
}
.notice-box {
  background:var(--card-bg); border-radius:var(--radius); padding:30px 24px;
  width:100%; max-width:380px; box-shadow:var(--shadow); border:1px solid var(--border);
}
.notice-title { font-size:18px; font-weight:600; text-align:center; margin-bottom:18px; color:var(--text-main); }
.notice-content { font-size:15px; line-height:1.7; color:var(--text-normal); white-space:pre-line; margin-bottom:24px; min-height:100px; }
.notice-btn { width:100%; padding:13px; border-radius:10px; background:var(--primary); color:#fff; font-size:15px; font-weight:500; border:none; cursor:pointer; }
#editModal {
  position:fixed; top:0; left:0; width:100%; height:100vh; background:rgba(0,0,0,0.25);
  display:none; align-items:center; justify-content:center; z-index:9999; padding:20px;
}
.modal-box {
  background:var(--card-bg); border-radius:var(--radius); padding:24px;
  width:100%; max-width:360px; box-shadow:0 8px 25px rgba(0,0,0,0.1); border:1px solid var(--border);
}
.modal-title { font-size:17px; font-weight:600; margin-bottom:16px; text-align:center; color:var(--text-main); }
.modal-input,.modal-select { width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--border); margin-bottom:12px; font-size:15px; }
.modal-btns { display:flex; gap:10px; margin-top:10px; }
.modal-btns button { flex:1; padding:11px; border-radius:10px; border:none; font-size:15px; font-weight:500; cursor:pointer; }
.btn-cancel { background:var(--light); color:var(--text-normal); }
.btn-save { background:var(--primary); color:#fff; }
#maintain {
  position:fixed; inset:0; z-index:999; background:#F7F8FA;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.maintain-box {
  background:var(--card-bg); border-radius:var(--radius); padding:40px 30px;
  width:100%; max-width:400px; text-align:center; border:1px solid var(--border); box-shadow:var(--shadow);
}
.maintain-icon { font-size:48px; margin-bottom:20px; color:var(--neutral); }
.maintain-title { font-size:20px; font-weight:600; margin-bottom:10px; color:var(--text-main); }
.maintain-desc { font-size:15px; color:var(--text-normal); line-height:1.5; margin-bottom:20px; }
#adminLoginBtnInMaintain {
  width:44px; height:44px; border-radius:50%; border:1px solid var(--border);
  background:var(--card-bg); font-size:18px; cursor:pointer; color:var(--primary); margin-top:12px;
}
#login {
  width:100%; max-width:360px; background:var(--card-bg); border-radius:var(--radius);
  padding:40px 30px; box-shadow:var(--shadow); border:1px solid var(--border); display:none; position:relative;
}
.login-footer { text-align:center; margin-top:28px; font-size:12px; color:var(--neutral); }
.admin-icon-btn { position:absolute; top:20px; right:20px; background:transparent; border:none; font-size:18px; color:var(--primary); cursor:pointer; }
.login-title { font-size:22px; font-weight:600; text-align:center; margin-bottom:28px; color:var(--text-main); }
/* 密码输入框容器 */
.pwd-input-box {
  position:relative; margin-bottom:18px;
}
.login-input { width:100%; padding:13px 16px 13px 40px; border-radius:10px; border:1px solid var(--border); font-size:15px; text-align:left; }
.pwd-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:18px; color:var(--neutral); cursor:pointer;
}
.remember-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:20px; font-size:14px; color:var(--text-normal); }
.btn { width:100%; padding:13px; border-radius:10px; border:none; font-size:15px; font-weight:500; cursor:pointer; }
.btn-primary { background:var(--primary); color:#fff; }
#home {
  width:100%; max-width:380px; background:var(--card-bg); border-radius:var(--radius);
  padding:30px 20px 70px; box-shadow:var(--shadow); border:1px solid var(--border); display:none; position:relative;
}
.head { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.head-title { font-size:20px; font-weight:600; color:var(--text-main); }
.back-btn { font-size:18px; color:var(--primary); cursor:pointer; font-weight:500; }
.category-title { font-size:16px; font-weight:600; color:var(--text-main); margin:16px 0 8px; padding-left:4px; display:flex; align-items:center; gap:6px; }
.home-footer { position:absolute; bottom:20px; left:0; right:0; text-align:center; font-size:12px; color:var(--neutral); }
#admin {
  width:100%; max-width:380px; background:var(--card-bg); border-radius:var(--radius);
  padding:30px 20px; box-shadow:var(--shadow); border:1px solid var(--border); display:none; position:relative;
}
.admin-footer { text-align:center; margin-top:28px; font-size:12px; color:var(--neutral); }
.collapse-header {
  display:flex; justify-content:space-between; align-items:center; padding:12px 0;
  font-size:15px; font-weight:500; cursor:pointer; user-select:none; color:var(--text-main);
}
.collapse-arrow { font-size:13px; color:var(--neutral); transition:transform 0.2s; }
.collapse-body { max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
.collapse-body.show { max-height:1000px; }
.section { margin-bottom:16px; }
.form-input,.form-text,.form-select { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); font-size:15px; margin-bottom:10px; background:#fff; }
.form-text { min-height:70px; resize:vertical; }
.btn-group { display:flex; gap:8px; margin-top:6px; }
.btn-group .btn { flex:1; }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-info { background:#4096ff; color:#fff; }
.form-switch { display:flex; align-items:center; margin-bottom:10px; font-size:15px; color:var(--text-normal); }
.form-switch input { transform:scale(1.1); margin-right:8px; }
.manager-line {
  display:flex; align-items:center; padding:13px; background:var(--light); border-radius:10px; margin-bottom:8px;
}
.manager-line .name { flex:1; font-size:15px; color:var(--text-main); }
.manager-line .sort-btns { display:flex; gap:4px; margin-right:6px; }
.manager-line .sort-btns button {
  width:28px; height:28px; border-radius:6px; border:none; background:var(--primary); color:#fff; font-size:14px; cursor:pointer;
}
.manager-line button { border:none; padding:6px 10px; border-radius:8px; font-size:13px; margin-left:6px; cursor:pointer; color:#fff; }
.btn-edit { background:var(--warning); }
.btn-del { background:var(--danger); }
.btn-toggle { background:var(--primary); }
.log-item {
  padding:8px 10px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text-normal);
}
.log-time { color:var(--primary); }
.log-ip { color:var(--success); }
.log-fail { color:var(--danger); }
.log-success { color:var(--success); }
/* 本地存储禁用提示 */
#storageTip {
  position:fixed; top:0; left:0; width:100%; padding:12px; background:var(--danger); color:#fff; font-size:14px; text-align:center; z-index:999999; display:none;
}
</style>
</head>
<body>
<!-- 本地存储禁用提示 -->
<div id="storageTip">浏览器本地存储已禁用/不可用，请开启后使用本系统！</div>

<div id="splash">
  <div class="splash-icon">🧭</div>
  <div class="splash-title">闲时导航</div>
  <div class="splash-desc">正在加载配置...</div>
  <div class="splash-footer" id="splash_copyright"></div>
</div>

<div id="notice">
  <div class="notice-box">
    <div class="notice-title">📢 系统公告</div>
    <div class="notice-content" id="notice_content"></div>
    <button class="notice-btn" onclick="closeNotice()">我已知晓</button>
    <div class="notice-footer" id="notice_copyright"></div>
  </div>
</div>

<div id="editModal">
  <div class="modal-box">
    <div class="modal-title">编辑导航</div>
    <input class="modal-input" id="edit_name" placeholder="导航名称">
    <input class="modal-input" id="edit_url" placeholder="跳转地址">
    <input class="modal-input" id="edit_icon" placeholder="自定义图标">
    <select class="modal-select" id="edit_cid"></select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEdit()">取消</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<div id="maintain">
  <div class="maintain-box">
    <div class="maintain-icon">🔧</div>
    <div class="maintain-title" id="mt_title">系统维护中</div>
    <div class="maintain-desc" id="mt_desc">升级维护中，暂不对外开放</div>
    <button id="adminLoginBtnInMaintain" onclick="show('login')">⚙️</button>
    <div class="maintain-footer" id="maintain_copyright"></div>
  </div>
</div>

<div id="login">
  <button class="admin-icon-btn" id="adminLoginBtn">⚙️</button>
  <div class="login-title">🔐 安全登录</div>
  <!-- 密码输入框优化：添加图标和可见性切换 -->
  <div class="pwd-input-box">
    <span class="pwd-icon" onclick="togglePwdVisible()">👀</span>
    <input type="password" class="login-input" id="pwd" placeholder="请输入登录密码">
  </div>
  <div class="remember-row">
    <input type="checkbox" id="rememberPwd">
    <label for="rememberPwd">记住密码</label>
  </div>
  <button class="btn btn-primary" id="userLoginBtn" onclick="userLogin()">登录</button>
  <div class="login-footer" id="login_copyright"></div>
</div>

<div id="home">
  <div class="head">
    <div class="head-title">🧭 导航菜单</div>
    <div class="back-btn" onclick="showLogin()">返回</div>
  </div>
  <div id="lineList"></div>
  <div class="home-footer" id="home_copyright"></div>
</div>

<div id="admin">
  <div class="head">
    <div class="head-title">⚙️ 管理后台</div>
    <div class="back-btn" onclick="showLogin()">返回</div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('backupCollapse')">
      <span>💾 备份/还原管理</span>
      <span class="collapse-arrow" id="arr_backupCollapse">▶</span>
    </div>
    <div class="collapse-body" id="backupCollapse">
      <button class="btn btn-success" onclick="exportBackup()" style="width:100%;margin-bottom:8px;">💾 导出本地备份</button>
      <input type="file" id="restoreFile" accept=".txt" style="width:100%;margin-bottom:8px;">
      <button class="btn btn-danger" onclick="importBackup()" style="width:100%;margin-bottom:8px;">⚠️ 从本地文件还原</button>
      <button class="btn btn-info" onclick="restoreFromGithubUrl()" style="width:100%;">🌐 手动从GitHub同步配置</button>
    </div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('styleCollapse')">
      <span>🎨 导航卡片样式</span>
      <span class="collapse-arrow" id="arr_styleCollapse">▶</span>
    </div>
    <div class="collapse-body" id="styleCollapse">
      <select class="form-select" id="cardStyleSelect">
        <option value="default">默认圆角</option>
        <option value="round">大圆角</option>
        <option value="square">直角</option>
        <option value="flat">简约无边框</option>
      </select>
      <div class="form-switch">
        <input type="checkbox" id="cardIconCenter">
        <label for="cardIconCenter">图标居中</label>
      </div>
      <button class="btn btn-success" onclick="saveCardStyle()" style="width:100%">💾 应用样式</button>
    </div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('noticeCollapse')">
      <span>📢 公告设置</span>
      <span class="collapse-arrow" id="arr_noticeCollapse">▶</span>
    </div>
    <div class="collapse-body" id="noticeCollapse">
      <div class="form-switch">
        <input type="checkbox" id="notice_enabled">
        <label for="notice_enabled">启用公告</label>
      </div>
      <input class="form-input" id="notice_title" placeholder="公告标题">
      <textarea class="form-text" id="notice_text" placeholder="公告内容"></textarea>
      <button class="btn btn-success" onclick="saveNotice()" style="width:100%">💾 保存公告</button>
    </div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('maintainCollapse')">
      <span>🛠 维护设置</span>
      <span class="collapse-arrow" id="arr_maintainCollapse">▶</span>
    </div>
    <div class="collapse-body" id="maintainCollapse">
      <input class="form-input" id="set_title" placeholder="维护标题">
      <textarea class="form-text" id="set_desc" placeholder="维护说明"></textarea>
      <div class="btn-group">
        <button class="btn btn-success" onclick="saveSet()">💾 保存</button>
        <button class="btn btn-primary" onclick="openMt()">🔓 开启维护</button>
        <button class="btn btn-danger" onclick="closeMt()">🔒 关闭维护</button>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('pwdCollapse')">
      <span>🔐 密码管理</span>
      <span class="collapse-arrow" id="arr_pwdCollapse">▶</span>
    </div>
    <div class="collapse-body" id="pwdCollapse">
      <input class="form-input" id="old_pwd" type="password" placeholder="原密码">
      <input class="form-input" id="new_pwd" type="password" placeholder="新密码（至少4位）">
      <input class="form-input" id="confirm_pwd" type="password" placeholder="确认新密码">
      <button class="btn btn-primary" onclick="updatePassword()" style="width:100%">✅ 修改密码</button>
      <div style="height:8px;"></div>
      <button class="btn btn-warning" onclick="resetPassword()" style="width:100%">🔄 重置为默认密码</button>
    </div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('categoryCollapse')">
      <span>📂 分类管理</span>
      <span class="collapse-arrow" id="arr_categoryCollapse">▶</span>
    </div>
    <div class="collapse-body" id="categoryCollapse">
      <div id="categoryList"></div>
      <input class="form-input" id="add_category_name" placeholder="分类名称">
      <input class="form-input" id="add_category_icon" placeholder="分类图标">
      <button class="btn btn-success" onclick="addCategory()" style="width:100%">➕ 添加分类</button>
    </div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('lineCollapse')">
      <span>🧭 导航管理</span>
      <span class="collapse-arrow" id="arr_lineCollapse">▶</span>
    </div>
    <div class="collapse-body" id="lineCollapse">
      <div id="adminLineList"></div>
      <input class="form-input" id="add_name" placeholder="导航名称">
      <input class="form-input" id="add_url" placeholder="跳转地址">
      <input class="form-input" id="add_icon" placeholder="自定义图标">
      <select class="form-select" id="add_cid"></select>
      <button class="btn btn-success" onclick="addLine()" style="width:100%">➕ 添加导航</button>
    </div>
  </div>
  <div class="section">
    <div class="collapse-header" onclick="toggleCollapse('copyrightCollapse')">
      <span>ℹ️ 版权信息</span>
      <span class="collapse-arrow" id="arr_copyrightCollapse">▶</span>
    </div>
    <div class="collapse-body" id="copyrightCollapse">
      <input class="form-input" id="copyright_text" placeholder="© 2026 闲时导航">
      <button class="btn btn-success" onclick="saveCopyright()" style="width:100%">💾 保存版权</button>
    </div>
  </div>
  <div class="admin-footer" id="admin_copyright"></div>
</div>

<script>
// ==============================================
// 全局常量配置（统一管理，便于修改）
// ==============================================
const CONFIG = {
  // GitHub配置拉取地址（3路加速）
  URL_LIST: [
    "https://cdn.jsdelivr.net/gh/caoyuanlin1990/caoyuanlin1990.github.io@main/nav-backup-1774766170141.json",
    "https://ghproxy.net/https://raw.githubusercontent.com/caoyuanlin1990/caoyuanlin1990.github.io/main/nav-backup-1774766170141.json",
    "https://raw.fastgit.org/caoyuanlin1990/caoyuanlin1990.github.io/main/nav-backup-1774766170141.json"
  ],
  // 默认配置
  DEFAULT_PWD: "668899",
  DEFAULT_CAT: [{id:1,name:'默认',icon:'📁',hidden:false}],
  DEFAULT_ICON: '🔗',
  DEFAULT_COPYRIGHT: '© 2026 闲时导航',
  // 提示文案
  TIP: {
    EMPTY: '不能为空',
    PWD_NOT_MATCH: '两次输入的新密码不一致',
    PWD_SHORT: '新密码长度至少4位',
    PWD_ERROR: '原密码输入错误',
    DEL_CAT_MIN: '至少保留一个分类',
    DEL_CAT_TIP: '确定删除该分类？<br>【重要】该分类下的所有导航将自动移入默认分类',
    DEL_LINE_TIP: '确定删除该导航？删除后无法恢复',
    RESET_PWD_TIP: '确定将密码重置为默认密码【668899】？<br>重置后需重新登录，原密码将失效',
    SYNC_TIP: '⚠️ 手动同步将覆盖本地所有配置数据，确定继续？',
    SUCCESS: '操作成功',
    FAIL: '操作失败',
    NET_ERROR: '网络异常，请检查网络后重试',
    JSON_ERROR: '配置文件损坏，启用本地兜底配置',
    STORAGE_ERROR: '本地存储操作失败'
  },
  // 请求超时时间
  FETCH_TIMEOUT: 4000
};

// ==============================================
// 全局状态封装（减少全局变量污染）
// ==============================================
const appState = {
  cardStyle: 'default',
  cardIconCenter: false,
  maintainMode: false,
  mt_title: '系统维护中',
  mt_desc: '升级维护中，暂不对外开放',
  notice_enabled: true,
  notice_title: '系统公告',
  notice_text: '欢迎使用闲时导航系统',
  copyright_text: CONFIG.DEFAULT_COPYRIGHT,
  categories: CONFIG.DEFAULT_CAT,
  lines: [],
  editIndex: -1,
  // 折叠面板状态
  collapseState: {},
  // 密码哈希
  get pwdHash() {

function checkStorage() {

  } catch (e) {

    return false;
  }
}
function getStorage(key) {
  if (!checkStorage()) return null;
  try {
    return localStorage.getItem(key);
  } catch (e) {
    console.error(CONFIG.TIP.STORAGE_ERROR, e);
    return null;
  }
}
function setStorage(key, val) {
  if (!checkStorage()) return false;
  try {
    localStorage.setItem(key, val);
    return true;
  } catch (e) {
    console.error(CONFIG.TIP.STORAGE_ERROR, e);
    return false;
  }
}
function removeStorage(key) {
  if (!checkStorage()) return false;
  try {
    localStorage.removeItem(key);

  } catch (e) {

    return false;

}

// 通用工具函数（抽离重复逻辑）

// HTML转义（防XSS）
function encodeHTML(s) {
  return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
}
// URL安全校验（修复空值/空格漏洞）
function safeUrl(url) {
  if (!url || url.trim() === '') return '#';
  try {
    const u = new URL(url.trim());
    return u.protocol.startsWith('http') ? u.href : '#';
  } catch {
    return '#';
  }
}
// 获取当前时间字符串
function nowStr() {
  return new Date().toLocaleString();
}
// 非空校验（带trim）
function isEmpty(val) {
  return !val || val.trim() === '';
}
// 按钮防重复提交（禁用+加载状态）
function btnLoading(btn, isLoading = true) {
  if (!btn) return;
  btn.disabled = isLoading;
  isLoading ? btn.classList.add('loading') : btn.classList.remove('loading');
}

// 核心数据处理（打包/解包/持久化）
// ==============================================
function packAll() {
  return {
    categories: appState.categories,
    lines: appState.lines,
    cardStyle: appState.cardStyle,
    cardIconCenter: appState.cardIconCenter,
    maintainMode: appState.maintainMode,
    mt_title: appState.mt_title,
    mt_desc: appState.mt_desc,
    notice_enabled: appState.notice_enabled,
    notice_title: appState.notice_title,
    notice_text: appState.notice_text,
    copyright_text: appState.copyright_text,
    pwd_hash: appState.pwdHash,
    collapseState: appState.collapseState
  };
}
function unpackAll(data) {
  if (!data) return;
  // 赋值状态
  appState.categories = data.categories || CONFIG.DEFAULT_CAT;
  appState.lines = data.lines || [];
  appState.cardStyle = data.cardStyle ?? 'default';
  appState.cardIconCenter = data.cardIconCenter ?? false;
  appState.maintainMode = data.maintainMode ?? false;
  appState.mt_title = data.mt_title ?? '系统维护中';
  appState.mt_desc = data.mt_desc ?? '升级维护中';
  appState.notice_enabled = data.notice_enabled ?? true;
  appState.notice_title = data.notice_title ?? '系统公告';
  appState.notice_text = data.notice_text ?? '欢迎使用';
  appState.copyright_text = data.copyright_text ?? CONFIG.DEFAULT_COPYRIGHT;
  appState.collapseState = data.collapseState ?? {};
  // 密码哈希
  if (data.pwd_hash) appState.pwdHash = data.pwd_hash;
  // 持久化到本地
  saveAllToLocal();
  // 实时更新维护页标题/描述（修复原初始化失效问题）
  document.getElementById('mt_title').innerText = appState.mt_title;
  document.getElementById('mt_desc').innerText = appState.mt_desc;
}
function saveAllToLocal() {
  setStorage('cats', JSON.stringify(appState.categories));
  setStorage('lines', JSON.stringify(appState.lines));
  setStorage('cardStyle', appState.cardStyle);
  setStorage('cardIconCenter', appState.cardIconCenter);
  setStorage('maintain', appState.maintainMode ? '1' : '0');
  setStorage('mt_title', appState.mt_title);

// ==============================================
// 配置同步（修复原变量未定义+增强错误处理）
// ==============================================
async function autoLoadConfigFromGithub() {
  let syncOk = false;
  const splashDesc = document.querySelector('.splash-desc');
  for (let i = 0; i < CONFIG.URL_LIST.length; i++) {
    const url = CONFIG.URL_LIST[i];
    splashDesc.innerText = `正在加载配置(${i+1}/3)...`;
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), CONFIG.FETCH_TIMEOUT);
      const res = await fetch(url, {
        signal: controller.signal,
        cache: "no-cache"
      });
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const txt = await res.text();
      // 单独捕获JSON解析错误
      let data;
      try {
        data = JSON.parse(txt);
      } catch (e) {
        throw new Error(CONFIG.TIP.JSON_ERROR);
      }
      unpackAll(data);
      console.log(`✅ 成功同步线路${i+1}：`, url);
      syncOk = true;
      break;
    } catch (e) {
      console.log(`❌ 线路${i+1}失败：`, url, e.message);
      continue;
    }
  }
  if (!syncOk) {
    console.log(`⚠️  所有云端线路失效，启用本地兜底配置`);
    showTip(CONFIG.TIP.JSON_ERROR, false);
  }
  renderAll();
  initPageShow();
}
async function restoreFromGithubUrl() {
  if (!confirm(CONFIG.TIP.SYNC_TIP)) return;
  const btn = event.target;
  btnLoading(btn, true);
  try {
    const res = await fetch(CONFIG.URL_LIST[0], { cache: "no-cache" });
    if (!res.ok) throw new Error(CONFIG.TIP.NET_ERROR);
    const txt = await res.text();
    const data = JSON.parse(txt);
    unpackAll(data);
    renderAll();
    showTip('手动同步GitHub配置成功');
  } catch (e) {
    showTip(`${CONFIG.TIP.FAIL}：${e.message}`, false);
  } finally {
    btnLoading(btn, false);
  }
}

// ==============================================
// 备份/还原（增加按钮防重复）
// ==============================================
function exportBackup() {
  try {
    const blob = new Blob([JSON.stringify(packAll(), null, 2)], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'nav-backup-' + Date.now() + '.txt';
    a.click();
    URL.revokeObjectURL(a.href);
    showTip('本地备份已导出');
  } catch (e) {
    showTip(`${CONFIG.TIP.FAIL}：${e.message}`, false);
  }
}
function importBackup() {
  const f = document.getElementById('restoreFile').files[0];
  const btn = event.target;
  btnLoading(btn, true);
  if (!f) {
    showTip('请选择本地备份文件', false);
    btnLoading(btn, false);
    return;
  }
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      unpackAll(d);
      renderAll();
      showTip('从本地文件还原成功');
    } catch (e) {
      showTip('备份文件格式错误/损坏', false);
    } finally {
      btnLoading(btn, false);
      // 清空文件选择
      document.getElementById('restoreFile').value = '';
    }
  };
  r.readAsText(f);
}

  if (isEmpty(text)) {
    showTip(`请输入版权信息`, false);
    btnLoading(btn, false);
    return;
  }
  appState.copyright_text = text;
  saveAllToLocal();
  loadCopyright();
  showTip('版权信息已保存');
  btnLoading(btn, false);
}
// 开启维护模式
function openMt() {
  setStorage('maintain', '1');
  appState.maintainMode = true;
  show('maintain');
  showTip('已开启维护模式，仅管理员可访问');
}
// 关闭维护模式
function closeMt() {
  setStorage('maintain', '0');
  appState.maintainMode = false;
  show('home');
  showTip('已关闭维护模式，所有人可正常访问');
}
// 修改密码（防重复+完善校验）
function updatePassword() {
  const oldPwd = document.getElementById('old_pwd').value.trim();
  const newPwd = document.getElementById('new_pwd').value.trim();
  const confirmPwd = document.getElementById('confirm_pwd').value.trim();
  const btn = event.target;
  btnLoading(btn, true);
  // 非空校验
  if (isEmpty(oldPwd) || isEmpty(newPwd) || isEmpty(confirmPwd)) {
    showTip(`请填写完整的密码信息`, false);
    btnLoading(btn, false);
    return;
  }
  // 密码一致性校验
  if (newPwd !== confirmPwd) {
    showTip(CONFIG.TIP.PWD_NOT_MATCH, false);
    btnLoading(btn, false);
    return;
  }
  // 密码长度校验
  if (newPwd.length < 4) {
    showTip(CONFIG.TIP.PWD_SHORT, false);
    btnLoading(btn, false);
    return;
  }
  // 原密码校验
  if (md5(oldPwd) !== appState.pwdHash) {
    showTip(CONFIG.TIP.PWD_ERROR, false);
    btnLoading(btn, false);
    return;
  }
  // 保存新密码
  appState.pwdHash = md5(newPwd);
  // 清空输入
  document.getElementById('old_pwd').value = '';
  document.getElementById('new_pwd').value = '';
  document.getElementById('confirm_pwd').value = '';
  // 清除记住的密码
  removeStorage('remember_pwd');
  showTip('密码修改成功，请重新登录');
  showLogin();
  btnLoading(btn, false);
}
// 重置密码（优化提示）
function resetPassword() {
  if (!confirm(CONFIG.TIP.RESET_PWD_TIP.replace('<br>', '\n'))) return;
  appState.pwdHash = md5(CONFIG.DEFAULT_PWD);
  removeStorage('remember_pwd');
  showTip(`密码已重置为默认密码：${CONFIG.DEFAULT_PWD}，请重新登录`);
  showLogin();
}

// ==============================================
// 登录功能（抽离函数+防重复）
// ==============================================
function userLogin() {
  const pwd = document.getElementById('pwd').value.trim();
  const btn = event.target;
  btnLoading(btn, true);
  if (isEmpty(pwd)) {
    showTip(`请输入登录密码`, false);
    btnLoading(btn, false);
    return;
  }
  // 密码校验
  if (md5(pwd) === appState.pwdHash) {
    saveRememberPwd(pwd);
    setAdminLoggedIn();
    show('home');
  } else {
    showTip('登录密码错误', false);
  }
  btnLoading(btn, false);
}
// 管理员后台登录
document.getElementById('adminLoginBtn').onclick = function() {
  const pwd = document.getElementById('pwd').value.trim();
  const btn = this;
  btnLoading(btn, true);
  if (md5(pwd) === appState.pwdHash) {
    saveRememberPwd(pwd);
    setAdminLoggedIn();
    show('admin');
  } else {
    showTip('登录密码错误', false);
  }
  btnLoading(btn, false);
};

// ==============================================
// 初始化入口（整合所有初始化逻辑）
// ==============================================
function init() {
  // 检测本地存储
  checkStorage();
  // 从本地加载状态
  loadFromLocal();
  // 初始化DOM赋值
  document.getElementById('mt_title').innerText = appState.mt_title;
  document.getElementById('mt_desc').innerText = appState.mt_desc;
  document.getElementById('notice_enabled').checked = appState.notice_enabled;
  document.getElementById('notice_title').value = appState.notice_title;
  document.getElementById('notice_text').value = appState.notice_text;
  document.getElementById('copyright_text').value = appState.copyright_text;
  document.getElementById('cardStyleSelect').value = appState.cardStyle;
  document.getElementById('cardIconCenter').checked = appState.cardIconCenter;
  // 自动加载GitHub配置
  autoLoadConfigFromGithub();
}
// 页面加载完成后初始化
window.onload = init;
</script>
